
services:
  - type: web
    name: tradepo-platform
    env: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: DATABASE_URL
        sync: false  # Будет настроено в Render Dashboard
      - key: SESSION_SECRET
        generateValue: true  # Render автоматически сгенерирует
      - key: JWT_SECRET
        generateValue: true  # Render автоматически сгенерирует
    healthCheckPath: /
